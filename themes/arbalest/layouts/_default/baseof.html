<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body class="{{ if .IsHome }}home{{ else if .IsPage }}single{{ else }}list{{ end }}">
  <a href="#main-content" class="skip-link">Skip to content</a>
  {{- partial "header.html" . -}}
  <main id="main-content" role="main" class="container">
    {{- block "main" . }}{{ end -}}
  </main>
  {{- partial "footer.html" . -}}
</body>
</html>
