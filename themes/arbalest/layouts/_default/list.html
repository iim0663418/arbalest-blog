{{ define "main" }}
<section class="list-page">
  <h1 class="page-title">{{ .Title }}</h1>
  <div class="bolt-separator"></div>
  {{ range .Pages }}
  <article class="post-item">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </article>
  {{ end }}
</section>
{{ end }}
