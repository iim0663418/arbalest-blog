{{ define "main" }}
<section class="list-page" aria-label="Post list">
  <header>
    <h1 class="page-title">{{ .Title }}</h1>
    <p class="post-count">{{ len .Pages }} {{ if eq (len .Pages) 1 }}post{{ else }}posts{{ end }}</p>
  </header>
  <div class="bolt-separator"></div>
  {{ range .Pages }}
  <article class="post-item">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    {{ with .Summary }}<p class="post-summary">{{ . | plainify | truncate 120 }}</p>{{ end }}
  </article>
  {{ end }}
</section>
{{ end }}
